# wtop — Gruvbox Dark theme
# https://github.com/morhetz/gruvbox

name         = "Gruvbox"
author       = "Pavel Pertsev (morhetz)"
version      = "1.0"
description  = "Port of Gruvbox Dark for wtop."
homepage     = "https://github.com/morhetz/gruvbox"
border_style = "plain"
gauge_style  = "block"
spark_chars  = "unicode"

[palette]
orange  = "#fe8019"
yellow  = "#fabd2f"
green   = "#b8bb26"
red     = "#fb4934"
blue    = "#83a598"
fg      = "#ebdbb2"
gray    = "#a89984"
bg_sel  = "#504945"
bg_alt  = "#32302f"

[colors]
border           = "gray"
border_focused   = "yellow"
title            = "yellow"
header           = "orange"

gauge_low        = "green"
gauge_medium     = "yellow"
gauge_high       = "red"

row_normal_fg    = "fg"
row_zebra_fg     = "fg"
row_zebra_bg     = "bg_alt"
row_selected_fg  = "fg"
row_selected_bg  = "bg_sel"
row_thread       = "gray"
row_suspicious   = "red"
row_spike        = "orange"

status_running   = "green"
status_suspended = "yellow"
status_other     = "gray"

filter_active_fg = "black"
filter_active_bg = "yellow"
filter_inactive  = "gray"

text_dim         = "gray"
text_normal      = "fg"
text_bright      = "blue"

spark_low        = "green"
spark_mid        = "yellow"
spark_high       = "red"
